services:
  - type: web
    name: zorvyn-dashboard
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: '' # Keep empty to let Next.js self-reference identically
      - key: PORT
        value: 10000
